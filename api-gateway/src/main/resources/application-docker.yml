# Perfil "docker": activo cuando SPRING_PROFILES_ACTIVE=docker.
# Sobrescribe únicamente los hostnames de los servicios downstream para
# usar el DNS interno de Compose. La estructura de rutas (predicates,
# filters, ids) vive una sola vez en application.yml y se reutiliza
# entre perfiles.
services:
  auth-uri: http://auth-service:8081
  task-uri: http://task-service:8082
