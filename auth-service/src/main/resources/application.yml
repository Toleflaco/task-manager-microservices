server:
  port: 8081

spring:
  application:
    name: auth-service
  # Placeholder: DB config will be added in Bloque 2 when moving Flyway migrations.
  # Placeholder: config de BD se añadirá en Bloque 2 al mover las migraciones Flyway.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration

management:
  endpoints:
    web:
      exposure:
        include: health, info
