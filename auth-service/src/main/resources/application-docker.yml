# Perfil "docker": activo cuando SPRING_PROFILES_ACTIVE=docker.
# Sobrescribe / añade solo lo que difiere del application.yml base.
# En test-run (Testcontainers) NO se activa este perfil: la conexión
# a Postgres viene por @ServiceConnection.

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/taskmanager?currentSchema=auth_schema
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
